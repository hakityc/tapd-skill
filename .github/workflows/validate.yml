name: Validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: scripts/tapd-context/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install CLI development dependencies
        run: npm ci
        working-directory: scripts/tapd-context

      - name: Test bundled CLI
        run: npm test
        working-directory: scripts/tapd-context

      - name: Validate skill package
        run: python3 scripts/quick_validate.py .
